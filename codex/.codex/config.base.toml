# Codex CLI global configuration
#
# Mirrors Claude Code settings.base.json using Codex-native mechanisms:
#   sandbox_mode + approval_policy  -> permissions (acceptEdits equivalent)
#   rules/default.rules             -> deny/ask/allow command gating
#   AGENTS.md                       -> behavioral instructions + domain rules

model = "gpt-5.5"
model_auto_compact_token_limit = 160000

# workspace-write: file edits auto-approved within project dir;
# .git/, .codex/, .agents/ always read-only (built-in protection).
sandbox_mode = "workspace-write"

# on-request: auto-approves workspace reads/edits, prompts for shell commands.
# Combined with Starlark allow rules for safe commands (git status, ls, grep).
approval_policy = "on-request"

file_opener = "none"
web_search = "live"

# Notification: Ghostty OSC 777 + tmux bell.
notify = ["bash", "$HOME/.codex/hooks/notify.sh"]
model_reasoning_effort = "medium"

[features]
unified_exec = true
multi_agent = true
shell_tool = true
codex_hooks = true

[shell_environment_policy]
inherit = "all"
exclude = ["AWS_SECRET*", "OPENAI_API_KEY", "*_TOKEN", "*_SECRET"]

[shell_environment_policy.set]
CODEX_GIT_WORKFLOW = "no-pr"
WIKI_VAULT = "/home/benkim0414/workspace/wiki"

[sandbox_workspace_write]
network_access = false
writable_roots = []

[tui]
notifications = true
theme = "catppuccin-mocha"

[history]
persistence = "save-all"

[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/git-session-start.sh"'
timeout = 10
statusMessage = "Loading git workflow context"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/resolve-pr-refs.sh"'
timeout = 10

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/git-safety.sh"'
timeout = 10
statusMessage = "Checking git command safety"

[[hooks.PreToolUse]]
matcher = "Edit|Write|^apply_patch$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/worktree-guard.sh"'
timeout = 10
statusMessage = "Checking worktree isolation"

[[hooks.PostToolUse]]
matcher = "Bash|Edit|Write|^apply_patch$|mcp__.*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/audit-log.sh"'
timeout = 10

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/capture-session-to-wiki.sh"'
timeout = 10

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
enabled_tools = ["sequentialthinking"]

[mcp_servers.qmd]
command = "qmd"
args = ["mcp"]
enabled_tools = ["query", "get", "multi_get", "status"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

# --- Telemetry (replaces audit-log hook) ---

[otel]
environment = "dev"
exporter = "none"
trace_exporter = "none"
log_user_prompt = false
