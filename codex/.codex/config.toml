# Codex CLI global configuration
#
# Mirrors Claude Code settings.base.json using Codex-native mechanisms:
#   sandbox_mode + approval_policy  -> permissions (acceptEdits equivalent)
#   rules/default.rules             -> deny/ask/allow command gating
#   AGENTS.md                       -> behavioral instructions + domain rules

model = "gpt-5.4"

# workspace-write: file edits auto-approved within project dir;
# .git/, .codex/, .agents/ always read-only (built-in protection).
sandbox_mode = "workspace-write"

# on-request: auto-approves workspace reads/edits, prompts for shell commands.
# Combined with Starlark allow rules for safe commands (git status, ls, grep).
approval_policy = "on-request"

file_opener = "none"
web_search = "live"

# Notification: Ghostty OSC 777 + tmux bell.
notify = ["bash", "$HOME/.codex/hooks/notify.sh"]
model_reasoning_effort = "medium"

[features]
unified_exec = true
multi_agent = true
shell_tool = true

[shell_environment_policy]
inherit = "all"
exclude = ["AWS_SECRET*", "OPENAI_API_KEY", "*_TOKEN", "*_SECRET"]

[sandbox_workspace_write]
network_access = false
writable_roots = []

[tui]
notifications = true
theme = "catppuccin-mocha"

[history]
persistence = "save-all"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
enabled_tools = ["sequentialthinking"]

[mcp_servers.qmd]
command = "qmd"
args = ["mcp"]
enabled_tools = ["query", "get", "multi_get", "status"]

[mcp_servers."awslabs.iam-mcp-server"]
command = "uvx"
args = ["awslabs.iam-mcp-server@latest"]
startup_timeout_sec = 30.0

[mcp_servers."awslabs.iam-mcp-server".env]
AWS_REGION = "ap-southeast-2"

[mcp_servers."awslabs.aws-pricing-mcp-server"]
command = "uvx"
args = ["awslabs.aws-pricing-mcp-server@latest"]
startup_timeout_sec = 30.0

[mcp_servers."awslabs.aws-pricing-mcp-server".env]
AWS_REGION = "ap-southeast-2"
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers."awslabs.cost-explorer-mcp-server"]
command = "uvx"
args = ["awslabs.cost-explorer-mcp-server@latest"]
startup_timeout_sec = 30.0

[mcp_servers."awslabs.cost-explorer-mcp-server".env]
AWS_REGION = "ap-southeast-2"
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers."awslabs.cfn-mcp-server"]
command = "uvx"
args = ["awslabs.cfn-mcp-server@latest"]
startup_timeout_sec = 30.0

[mcp_servers."awslabs.cfn-mcp-server".env]
AWS_REGION = "ap-southeast-2"

[mcp_servers."awslabs.aws-serverless-mcp-server"]
command = "uvx"
args = ["awslabs.aws-serverless-mcp-server@latest", "--allow-write", "--allow-sensitive-data-access"]
startup_timeout_sec = 30.0

[mcp_servers."awslabs.aws-serverless-mcp-server".env]
AWS_REGION = "ap-southeast-2"

[mcp_servers."awslabs.eks-mcp-server"]
command = "uvx"
args = ["awslabs.eks-mcp-server@latest", "--allow-sensitive-data-access"]
startup_timeout_sec = 30.0

[mcp_servers."awslabs.eks-mcp-server".env]
AWS_REGION = "ap-southeast-2"

[mcp_servers."awslabs.cloudwatch-mcp-server"]
command = "uvx"
args = ["awslabs.cloudwatch-mcp-server@latest"]
startup_timeout_sec = 30.0

[mcp_servers."awslabs.cloudwatch-mcp-server".env]
AWS_REGION = "ap-southeast-2"

[mcp_servers.kubernetes]
command = "npx"
args = ["kubernetes-mcp-server@latest"]
startup_timeout_sec = 30.0

[mcp_servers.grafana]
command = "uvx"
args = ["mcp-grafana"]
env_vars = ["GRAFANA_API_KEY"]
startup_timeout_sec = 30.0

[mcp_servers.grafana.env]
GRAFANA_URL = "https://monitoring.geocreation.com.au"

[mcp_servers.argocd]
command = "npx"
args = ["argocd-mcp@latest", "stdio"]
env_vars = ["ARGOCD_API_TOKEN"]
startup_timeout_sec = 30.0

[mcp_servers.argocd.env]
ARGOCD_BASE_URL = "https://argocd.geocreation.com.au"

[mcp_servers.sentry]
url = "https://mcp.sentry.dev/mcp"

[mcp_servers.atlassian]
url = "https://mcp.atlassian.com/v1/mcp"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

# --- Telemetry (replaces audit-log hook) ---

[otel]
environment = "dev"
exporter = "none"
trace_exporter = "none"
log_user_prompt = false

[projects."/Users/ben/workspace/ops"]
trust_level = "trusted"

[projects."/Users/ben/workspace/web-api-gateway"]
trust_level = "trusted"

[projects."/Users/ben/workspace/geo-server"]
trust_level = "trusted"

[projects."/Users/ben/workspace/rec-registry-creation-service"]
trust_level = "trusted"

[projects."/Users/ben/workspace/dotfiles"]
trust_level = "trusted"

[projects."/Users/ben/workspace/envoy"]
trust_level = "trusted"

[projects."/Users/ben/workspace/mgob"]
trust_level = "trusted"
