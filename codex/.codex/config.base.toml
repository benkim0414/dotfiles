#:schema https://developers.openai.com/codex/config-schema.json
# Minimal global Codex configuration.
#
# Auto mode is workspace-write sandboxing plus on-request approvals: Codex can
# edit and run commands in the active workspace, then asks before leaving that
# boundary or doing approval-sensitive work.

model = "gpt-5.5"
review_model = "gpt-5.4"
model_auto_compact_token_limit = 160000
model_reasoning_effort = "medium"

sandbox_mode = "workspace-write"
approval_policy = "on-request"

file_opener = "none"
web_search = "live"

[tui]
notifications = true
theme = "catppuccin-mocha"

[history]
persistence = "save-all"

[otel]
environment = "dev"
exporter = "none"
trace_exporter = "none"
log_user_prompt = false
