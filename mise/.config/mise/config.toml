[settings]
# Auto-trust mise.toml files under ~/workspace without prompting
trusted_config_paths = ["/home/benkim0414/workspace"]

# Reduce hook-env overhead: suppress status messages on every prompt
status.missing_tools = "never"
status.show_env = false
status.show_tools = false

[tools]
node = "24"
neovim = "latest"
lazygit = "latest"
"npm:@openai/codex" = "latest"
go = "latest"

[env]
# Load machine-local secrets (e.g. work MCP credentials) into every mise-activated shell.
# File is populated once via `mise-load-op ~/.env.op ~/.env.local` (work laptop only).
# Silently skipped if ~/.env.local does not exist -- safe on machines without work credentials.
_.file = ["~/.env.local"]
