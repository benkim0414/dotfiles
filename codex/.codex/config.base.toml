#:schema https://developers.openai.com/codex/config-schema.json
# Use the default interactive coding model.
model = "gpt-5.5"
# Use a smaller strong model for review-oriented subagents and review tasks.
review_model = "gpt-5.4"
# Codex has no schema default for this knob; a clean config reports `null`.
# Keep the threshold below the local model catalog context budget so compaction
# can run while there is still room for tool output and the compaction request.
model_auto_compact_token_limit = 200000
# Keep reasoning balanced for day-to-day coding latency and depth.
model_reasoning_effort = "medium"

# Allow reads plus writes inside the active workspace by default.
sandbox_mode = "workspace-write"
# Ask before leaving the sandbox or doing approval-sensitive work.
approval_policy = "on-request"
# Route approval requests through Codex's risk-based reviewer so subagents do
# not interrupt the user for routine low-risk operations.
approvals_reviewer = "auto_review"

# Avoid launching a GUI editor from Codex.
file_opener = "none"
# Enable live web search for current documentation and time-sensitive facts.
web_search = "live"

[auto_review]
# Keep the reviewer narrow: routine repo work can proceed, boundary crossings
# still require explicit user intent or a durable scoped rule.
policy = """
Approve routine sandbox-compatible repository work: read-only commands, status
inspection, diffs, formatting checks, and test commands that write only inside
the active workspace or temporary directories.

Approve GitHub-scoped collaboration and branch sync commands when they are run
from the active repository worktree and are limited to ordinary PR, issue,
fetch, pull, or push workflows. This includes GitHub CLI PR view, list,
create, edit, comment, check, status, and review operations; GitHub CLI issue
view, list, create, edit, comment, and status operations; git fetch; git pull;
and ordinary non-force current-branch git push to GitHub remotes.

Deny destructive commands, broad arbitrary shell approvals, credential access,
writes outside configured workspace roots, non-GitHub network access, direct
GitHub API access through arbitrary runtimes or shell scripts, GitHub merge
operations, branch deletion, repository administration, settings or secrets
changes, destructive issue or PR operations, force pushes, history rewrites,
and broad branch mutation commands. These sensitive operations require direct
user approval and must not be approved by auto-review.

When an approval request includes a persistent prefix rule, approve only narrow
operation-specific prefixes such as gh pr view, gh pr list, gh pr create, gh pr
edit, gh pr comment, gh pr check, gh pr status, gh pr review, gh issue view,
gh issue list, gh issue create, gh issue edit, gh issue comment, gh issue
status, git fetch, or git pull. Persistent git push prefix rules must not be
approved unless the approval mechanism can enforce the full exact constraint;
in the current prefix-rule model, agents should request per-command approval
for ordinary pushes instead of a durable git push prefix. Do not approve broad
runtime prefixes such as bash, python, node, ruby, perl, or sh.
"""

[features]
# Keep command hooks explicit in the checked-in base config.
hooks = true

[tui]
# Let Codex surface terminal notifications when attention is needed.
notifications = true
# Match the existing terminal color theme.
theme = "catppuccin-mocha"

[history]
# Keep conversation history available across Codex sessions.
persistence = "save-all"

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/atomic-commits.sh"'
timeout = 10
statusMessage = "Checking atomic commit workflow"

[[hooks.PreToolUse]]
matcher = "apply_patch|Edit|Write|MultiEdit|NotebookEdit|local_shell|shell|shell_command|exec_command|Bash|Shell|mcp__"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'bash "$HOME/.codex/hooks/worktree-guard.sh"'
timeout = 10
statusMessage = "Checking worktree isolation"

[[hooks.PreToolUse]]
matcher = "local_shell|shell|shell_command|exec_command|Bash|Shell|apply_patch|Edit|Write|grep_files|ctx_execute|ctx_execute_file|ctx_batch_execute|ctx_fetch_and_index|ctx_search|ctx_index|mcp__"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.local/share/mise/installs/node/24/bin:/usr/local/bin:/usr/bin:/bin" context-mode hook codex pretooluse'
timeout = 10
statusMessage = "Indexing tool call context"

[[hooks.PostToolUse]]

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.local/share/mise/installs/node/24/bin:/usr/local/bin:/usr/bin:/bin" context-mode hook codex posttooluse'
timeout = 10
statusMessage = "Indexing tool result context"

[[hooks.SessionStart]]

[[hooks.SessionStart.hooks]]
type = "command"
command = 'PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.local/share/mise/installs/node/24/bin:/usr/local/bin:/usr/bin:/bin" context-mode hook codex sessionstart'
timeout = 10
statusMessage = "Loading context-mode session context"

[[hooks.PreCompact]]

[[hooks.PreCompact.hooks]]
type = "command"
command = 'PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.local/share/mise/installs/node/24/bin:/usr/local/bin:/usr/bin:/bin" context-mode hook codex precompact'
timeout = 10
statusMessage = "Saving context before compaction"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.local/share/mise/installs/node/24/bin:/usr/local/bin:/usr/bin:/bin" context-mode hook codex userpromptsubmit'
timeout = 10
statusMessage = "Indexing user prompt context"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.local/share/mise/installs/node/24/bin:/usr/local/bin:/usr/bin:/bin" context-mode hook codex stop'
timeout = 10
statusMessage = "Saving session context"

[mcp_servers.context-mode]
# Launch context-mode as a Codex MCP server.
command = "context-mode"
# Allow all context-mode MCP tools without per-call approval prompts.
default_tools_approval_mode = "approve"

[marketplaces.superpowers-marketplace]
# Load the Superpowers plugin marketplace from its Git repository.
source = "https://github.com/obra/superpowers-marketplace.git"
# Tell Codex to treat the marketplace source as a Git checkout.
source_type = "git"

[marketplaces.compound-engineering-plugin]
# Load the Compound Engineering plugin marketplace from its Git repository.
source = "https://github.com/EveryInc/compound-engineering-plugin.git"
# Tell Codex to treat the marketplace source as a Git checkout.
source_type = "git"

[plugins."superpowers@superpowers-marketplace"]
enabled = true

[plugins."compound-engineering@compound-engineering-plugin"]
enabled = true

[otel]
# Label telemetry metadata as local development when telemetry is enabled.
environment = "dev"
# Disable OpenTelemetry export by default.
exporter = "none"
# Disable trace export separately from the general exporter setting.
trace_exporter = "none"
# Prevent user prompts from being included in telemetry payloads.
log_user_prompt = false
